name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # setuptools_scm derives the version from git history and tags.
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install build twine
          python -m build
          python -m twine check dist/*
      - name: Check built version matches release tag
        if: github.event_name == 'release'
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [ ! -f "dist/kafkaesq-${tag}.tar.gz" ]; then
            echo "built artifacts do not match release tag '$GITHUB_REF_NAME':" >&2
            ls dist/ >&2
            echo "setuptools_scm derives the version from the tag; tag releases as vX.Y.Z" >&2
            exit 1
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/kafkaesq
    permissions:
      # Required for PyPI trusted publishing (OIDC) — no API token needed.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
