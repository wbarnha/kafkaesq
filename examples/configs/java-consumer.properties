# A config written for the Apache Kafka *Java* client. Some keys are
# Java-only (truststore, JAAS, class-based deserializers, max.poll.records);
# run `kafkaesq validate` on this file to see the targeted guidance.
bootstrap.servers=broker1:9092,broker2:9092
group.id=billing
key.deserializer=org.apache.kafka.common.serialization.StringDeserializer
value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
max.poll.records=500
session.timeout.ms=45000
security.protocol=SASL_SSL
sasl.mechanism=PLAIN
sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="svc-billing" password="CHANGE_ME";
ssl.truststore.location=/etc/kafka/client.truststore.jks
ssl.truststore.password=CHANGE_ME
